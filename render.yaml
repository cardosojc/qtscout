# Render Blueprint for the FastAPI backend (Docker). Deploy via Render →
# "New +" → "Blueprint" pointed at this repo. Railway can use the same
# Dockerfile: create a service, set root directory to `api/`, and add the same
# env vars (Railway provides $PORT automatically, like Render).
#
# Secret values are NOT stored here (sync: false) — set them in the dashboard.
services:
  - type: web
    name: qtscout-api
    runtime: docker
    repo: https://github.com/cardosojc/qtscout
    dockerfilePath: ./api/Dockerfile
    dockerContext: ./api
    plan: starter
    healthCheckPath: /api/health
    autoDeploy: false
    envVars:
      - key: DATABASE_URL          # Supabase pooler (transaction mode)
        sync: false
      - key: DIRECT_URL            # Supabase direct connection (Alembic)
        sync: false
      - key: SUPABASE_URL          # = NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY  # = NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY   # service-role key (admin user create/delete)
        sync: false
      - key: MISTRAL_API_KEY       # AI rewrite
        sync: false
      - key: WEB_ORIGIN            # comma-separated allowed web origins (CORS)
        sync: false
